<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Landing Page</title>
</head>
<body>
    
    <div class="header">
        <img src="images/logo.png" alt="Silhouete of a man doing a handstand" class="logo">
        <div class="header-links">
            <ul>
                <li><a href="#">Header Link One</a></li>
                <li><a href="#">Header Link Two</a></li>
                <li><a href="#">Header Link Three</a></li>
            </ul>
        </div>
    </div>

    <div class="hero">
        <div class="hero-right">
            <div class="hero-title"><p>This Website is awesome</p></div>
            <div class="hero-info"><p>This Website has some subtext that goes here under the main title. It's a smaller font and the color is lower contrast</p></div>
            <div><button class="button1">Sign Up</button></div>
        </div>
        <div>
            <img src="images/main-image.jpg" alt="Man doing a diamond push-up" class="main-image">
        </div>
    </div>

    <div class="content">
        <div class="info-title"><p>Some Random Information</p></div>
    </div>

</body>
</html>
